kind = "web"
previewPath = "/"
title = "365 Atividades Bíblicas"
version = "1.0.0"
id = "artifacts/sales-page"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18872

[services.development]
run = "pnpm --filter @workspace/sales-page run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sales-page", "run", "build" ]
publicDir = "artifacts/sales-page/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18872"
BASE_PATH = "/"
